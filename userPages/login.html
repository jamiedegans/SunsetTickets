<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../app/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto+Mono&display=swap" rel="stylesheet">
</head>

<body>
    <header>

        <span>SunsentTickets</span>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="reizen.html">Reizen</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="center">
            <div class="orbitron">
                <div class="login-welcome-box"> 
                    <span>SunsentTickets</span>
                    <h1>Inloggen</h1>
                    <p>Welkom . Log in op jouw account.</p>    
                </div>
            </div>    
        </div>
        <div class="center">  
            <div class="login">
                <div class="login-veld">
                    <label for="email">E-MAILADRES</label>
                    <input type="email" id="email" placeholder="naam@voorbeeld.com">
                </div>

                <div class="login-veld">
                    <label for="wachtwoord">WACHTWOORD</label>
                    <input type="password" id="wachtwoord" placeholder="I dunno">
                </div>

                <button type="button" class="login-btn">INLOGGEN</button>

                <div class="login-footer">
                    <span>Wachtwoord Vergeten?</span>
                    <span>Nog geen account?</span>
                </div>
            </div>
        </div>    
    </main>
</body>

</html>
