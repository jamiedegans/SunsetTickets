<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunsetTickets - Account</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&family=Roboto+Mono&display=swap" rel="stylesheet">

<body>

    
    <main class="main-contact">

        <div>
            <p class="label">Contact</p>
            <h2 class="orbitron">get in touch</h2>
        </div>
        <div>
            <form class="login" id="contact-form" onsubmit="handleContact(event)">
                <h3 class="orbitron">stuur bericht</h3>

                <div class="login-veld">
                    <label class="orbition">Your Name</label>
                    <input type="text" placeholder="naam" required />
                </div>

                <div class="login-veld">
                    <label>E-MAILADRES</label>
                    <input type="email" class="btn" placeholder="you@example.com" required />
                </div>

                <div class="login-veld">
                    <label>uw bericht</label>
                    <textarea class="contact-textarea" placeholder="Schrijf hier uw bericht..." rows="5"
                        required></textarea>
                </div>

                <button type="submit" class="btn red">Verstuur</button>
            </form>
        </div>
    </main>

      <footer class="small center">
        <div class="row-right">
            <div class="row-down">
                <h2 class="orbitron"> SunsetTickets </h2>
                <p>Your festival travel companion for <br> unforgettable music <br> experiences around the world.</p>
            </div>
            <div class="row-down font-gray">
                <h3 class="orbitron">Contact</h3>
                <p>Email: info@sunsettickets.com</p>
                <p>Phone: +31 123 456 789</p>
            </div>
            <div class="row-down font-gray">
                <h3 class="orbitron">Pages</h3>
                <p><a href="index.html">Home</a></p>
                <p><a href="reizen.html">Reizen</a></p>
                <p><a href="about.html">over ons</a></p>
            </div>
        </div>

        <p class="center font-gray small">&copy; 2024 SunsetTickets. All rights reserved.</p>
    </footer>
    <script src="../scripts/tickets.js" defer></script>
</body>



</html>
